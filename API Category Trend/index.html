};

function trimCats(name, cats) {
  const start = (LAUNCH_MONTH[name] !== undefined) ? LAUNCH_MONTH[name]
    : (() => {
        for (let i = 0; i < MONTHS.length; i++) {
          if (Object.values(cats).some(arr => arr[i] > 0)) return i;
        }
        return 0;
      })();
  if (start === 0) return { months: MONTHS, cats };
  const months = MONTHS.slice(start);
  const trimmed = {};
  for (const k in cats) trimmed[k] = cats[k].slice(start);
  return { months, cats: trimmed };
}

// ── VOLATILITY SCORING ───────────────────────────────────────────────────────
function coeffVar(arr) {
  const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
  if (mean === 0) return 0;
  const sd = Math.sqrt(arr.map(v=>Math.pow(v-mean,2)).reduce((a,b)=>a+b,0)/arr.length);
  return sd/mean;
}
function clientCV(cats) {
  const totals = MONTHS.map((_,i) => Object.values(cats).reduce((s,c)=>s+c[i],0));
  return coeffVar(totals);
}

      const totals = [];
      for (let i = start; i < MONTHS.length; i++) {
        totals.push(Object.values(cats).reduce((s,c) => s + c[i], 0));
      }
      return totals.length ? totals.reduce((a,b)=>a+b,0) / totals.length : 0;
    }
    return monthlyAvg(b.name, b.cats) - monthlyAvg(a.name, a.cats);

  const container = document.getElementById('cards_' + arch.id);

  sorted.forEach(client => {
    const cv = clientCV(client.cats);
    const { months: activeMONTHS, cats: activeCats } = trimCats(client.name, client.cats);
    const catNames = Object.keys(activeCats);
    const monthTotals = activeMONTHS.map((_,i) => catNames.reduce((s,c)=>s+activeCats[c][i],0));
    const grandTotal = monthTotals.reduce((a,b)=>a+b,0);

    let varBadge = '';
    if (cv > 0.6) varBadge = '<span class="variance-badge variance-high">HIGH VARIANCE</span>';
    else if (cv > 0.3) varBadge = '<span class="variance-badge variance-shift">SHIFTING</span>';

    const cid = 'tc_' + arch.id + '_' + client.name.replace(/[^a-z0-9]/gi,'_');

    const card = document.createElement('div');
    card.className = 'trend-card';
    card.innerHTML = `
      <div class="trend-card-header">
        <div><span class="trend-client-name">${client.name}</span>${varBadge}</div>
        <span class="trend-total">${fmt(grandTotal)} total</span>
      </div>
      <div class="trend-chart-wrap">
        <canvas id="${cid}" role="img" aria-label="API usage trend for ${client.name}"></canvas>
      </div>
      <div class="trend-legend" id="leg_${cid}"></div>`;
    container.appendChild(card);

    // legend
    const legEl = document.getElementById('leg_' + cid);
    catNames.forEach(cat => {
      const c = COLORS[cat] || { border:'#ccc', label: cat };
      const shortName = cat === 'Quest, Rewards & Leaderboard' ? 'Quest & Rewards' : cat;
      legEl.innerHTML += `<span class="tleg-item"><span class="tleg-dot" style="background:${c.border}"></span>${shortName}</span>`;
    });

    requestAnimationFrame(() => {
      const canvas = document.getElementById(cid); if (!canvas) return;
      const ctx = canvas.getContext('2d');

      const datasets = catNames.map(cat => {
        const c = COLORS[cat] || { fill:'rgba(150,150,150,0.4)', border:'#999' };
        return {
          label: cat,
          data: activeCats[cat],
          backgroundColor: c.fill,
          borderColor: c.border,
          borderWidth: 1.5,
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 4,
        };
      });

      new Chart(ctx, {
        type: 'line',
        data: { labels: activeMONTHS, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode:'index', intersect:false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#111',
              titleFont: { family:'Manrope', size:11, weight:'600' },
              bodyFont:  { family:'Manrope', size:10 },
              titleColor: '#fff',
              bodyColor:  '#ccc',
              padding: 8,
              cornerRadius: 5,
              callbacks: {
                label: c => ` ${c.dataset.label}: ${fmtK(c.parsed.y)}`
              }
            }
          },
          scales: {
            x: {
              stacked: true,
              grid: { color:'rgba(0,0,0,0.05)', drawBorder:false },
              ticks: { font:{family:'Manrope',size:9}, color:'#bbb', maxRotation:0, autoSkip:true, maxTicksLimit:7 },
              border: { display:false }
            },
            y: {
              stacked: true,
              grid: { color:'rgba(0,0,0,0.05)', drawBorder:false },
              ticks: { font:{family:'Manrope',size:9}, color:'#bbb', callback: v => fmt(v), maxTicksLimit:4 },
              min: 0,
              border: { display:false }
            }
          }
        }
      });
    });
  });
});
</script>
</body>
</html>
